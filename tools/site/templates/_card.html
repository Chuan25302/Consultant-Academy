{#- Reusable post card. Expects `p` (Post) + `rel` from caller. -#}
<a class="card pillar-{{ p.pillar_slug }}" href="{{ rel }}{{ p.url.lstrip('/') }}">
  <span class="card-tag">{{ p.pillar_icon }} {{ p.pillar_label }}</span>
  <h3 class="card-title">{{ p.title }}</h3>
  {% if p.tldr %}<p class="card-tldr">{{ p.tldr }}</p>{% endif %}
  <div class="card-meta">
    <span>📅 {{ p.date_th }}</span>
    {% if p.level %}<span class="lvl" data-l="{{ p.level }}">L{{ p.level }}</span>{% endif %}
    {% if p.show_cluster %}<span>· 🎯 {{ p.cluster }}</span>{% endif %}
  </div>
</a>
