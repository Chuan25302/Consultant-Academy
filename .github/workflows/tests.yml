name: Tests

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

# Force JS actions onto Node 24 so the Node-20 deprecation warning
# stops surfacing on every CI run. Safe to remove once all referenced
# actions ship Node-24 releases.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - run: ruff check .

  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: pytest
