name: Rebuild KM Site (manual)

# Manual-only KM site rebuild — useful after editing templates/CSS, or to
# pick up backfilled posts without waiting for the next daily run.
#
# The automatic daily rebuild lives in `daily-routine.yml` (deploy-site
# job). That auto-build always runs after the email is sent, so this
# workflow exists purely for ad-hoc rebuilds.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Write service account keys
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_OAUTH_TOKEN_JSON: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON }}
        run: |
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > google-key.json
          if [ -n "$GOOGLE_OAUTH_TOKEN_JSON" ]; then
            printf '%s' "$GOOGLE_OAUTH_TOKEN_JSON" > oauth-token.json
          fi

      - name: Build site
        env:
          GOOGLE_SERVICE_ACCOUNT_FILE: google-key.json
          CALENDAR_FILE_ID: ${{ secrets.CALENDAR_FILE_ID }}
          FOLDER_EMAIL_ARCHIVES: ${{ secrets.FOLDER_EMAIL_ARCHIVES }}
          FOLDER_KNOWLEDGE_BASE: ${{ secrets.FOLDER_KNOWLEDGE_BASE }}
        run: python tools/build_site.py --output _site

      - name: Always clean up service account keys
        if: always()
        run: rm -f google-key.json oauth-token.json

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
