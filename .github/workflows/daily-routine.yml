name: Consultant Academy Daily Routine

on:
  schedule:
    - cron: "0 0 * * 1-6"   # Mon–Sat 07:00 Bangkok (UTC+7)
                            # Mon–Fri = full pipeline, Sat = RECAP only
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip Drive uploads)"
        required: false
        default: "false"
      date:
        description: "Override date YYYY-MM-DD (default: today Bangkok)"
        required: false
        default: ""

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write service account keys
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          VERTEX_AI_SERVICE_ACCOUNT_JSON: ${{ secrets.VERTEX_AI_SERVICE_ACCOUNT_JSON }}
          GOOGLE_OAUTH_TOKEN_JSON: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON }}
        run: |
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > google-key.json
          test -s google-key.json || (echo "::error::GOOGLE_SERVICE_ACCOUNT_JSON secret is empty" && exit 1)
          printf '%s' "$VERTEX_AI_SERVICE_ACCOUNT_JSON" > vertex-ai-service-key.json
          test -s vertex-ai-service-key.json || (echo "::error::VERTEX_AI_SERVICE_ACCOUNT_JSON secret is empty" && exit 1)
          if [ -n "$GOOGLE_OAUTH_TOKEN_JSON" ]; then
            printf '%s' "$GOOGLE_OAUTH_TOKEN_JSON" > oauth-token.json
            echo "OAuth token written ($(wc -c < oauth-token.json) bytes)"
          else
            echo "GOOGLE_OAUTH_TOKEN_JSON not set — will use service account"
          fi

      - name: Run daily routine
        env:
          GOOGLE_SERVICE_ACCOUNT_FILE: google-key.json
          VERTEX_AI_SERVICE_ACCOUNT_FILE: vertex-ai-service-key.json
          VERTEX_AI_PROJECT: ${{ secrets.VERTEX_AI_PROJECT }}
          VERTEX_AI_LOCATION: ${{ secrets.VERTEX_AI_LOCATION }}
          CALENDAR_FILE_ID: ${{ secrets.CALENDAR_FILE_ID }}
          FOLDER_EMAIL_ARCHIVES: ${{ secrets.FOLDER_EMAIL_ARCHIVES }}
          FOLDER_KNOWLEDGE_BASE: ${{ secrets.FOLDER_KNOWLEDGE_BASE }}
          FOLDER_PROGRAM_MGMT: ${{ secrets.FOLDER_PROGRAM_MGMT }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
          GEMINI_MODEL: gemini-2.5-flash
          GEMINI_MODEL_RESEARCH: gemini-2.5-flash
          GEMINI_MODEL_EXPERT: gemini-2.5-pro
          GEMINI_MODEL_INDUSTRY: gemini-2.5-flash
          GEMINI_MODEL_FACTCHECKER: gemini-2.5-pro
          GEMINI_MODEL_TRANSLATOR: gemini-2.5-flash
          GEMINI_MODEL_EDITOR: gemini-2.5-pro
          GEMINI_MODEL_SUSTAINABILITY: gemini-2.5-pro
          GEMINI_MODEL_PLANNER: gemini-2.5-pro
          GEMINI_MODEL_RECAP: gemini-2.5-flash
        run: |
          ARGS=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && ARGS="$ARGS --dry-run"
          [ -n "${{ github.event.inputs.date }}" ] && ARGS="$ARGS --date ${{ github.event.inputs.date }}"
          python src/main.py $ARGS

      - name: Upload cost log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cost-log-${{ github.run_id }}
          path: data/cost_log.jsonl
          retention-days: 30

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -sS -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\":x: Consultant Academy daily routine failed. Run: $RUN_URL\"}" \
              "$SLACK_WEBHOOK_URL" || true
          fi

      - name: Always clean up service account keys
        if: always()
        run: rm -f google-key.json vertex-ai-service-key.json oauth-token.json
